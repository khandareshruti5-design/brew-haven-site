<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu | Brew Haven</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-logo"><h2>☕ Brew Haven</h2></a>
            <ul class="nav-menu">
                
                 <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="reviews.html" class="nav-link">Reviews</a></li>
                <li><a href="gallery.html" class="nav-link">Gallery</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="cart.html" class="nav-link">Cart 🛒</a></li>
                <li><a href="team.html" class="nav-link">Our Team</a></li>
                  
            </ul>
        </nav>
    </header>

    <section class="menu-section" style="padding-top: 100px;">
        <h2 class="section-title">Menu Highlights</h2>
        <div class="section-content">
            <ul class="menu-list">
                <li class="menu-item">
                    <img src="images/hot-beverages.png" class="menu-image" />
                    <h3>Hot Coffee</h3>
                    <p class="price">₹190</p>
                    <button class="cart-btn" onclick="addToCart('Hot Coffee', 190, 'images/hot-beverages.png')">Add to Cart 🛒</button>
                </li>
                <li class="menu-item">
                    <img src="images/cold-beverages.png" class="menu-image" />
                    <h3>Cold Coffee</h3>
                    <p class="price">₹200</p>
                    <button class="cart-btn" onclick="addToCart('Cold Coffee', 200, 'images/cold-beverages.png')">Add to Cart 🛒</button>
                </li>
                 <li class="menu-item">
                    <img src="images/burger-frenchfries.png" class="menu-image" />
                    <h3>burgar</h3>
                    <p class="price">₹190</p>
                    <button class="cart-btn" onclick="addToCart('Burgar', 190, 'images/hot-beverages.png')">Add to Cart 🛒</button>
                </li>
                 <li class="menu-item">
                    <img src="images/desserts.png" class="menu-image" />
                    <h3>desserts</h3>
                    <p class="price">₹190</p>
                    <button class="cart-btn" onclick="addToCart('Desserts', 190, 'images/hot-beverages.png')">Add to Cart 🛒</button>
                </li>
                <li class="menu-item">
                    <img src="images/special-combo.png" class="menu-image" />
                    <h3>special-combo</h3>
                    <p class="price">₹200</p>
                    <button class="cart-btn" onclick="addToCart('special-combo', 200, 'images/cold-beverages.png')">Add to Cart 🛒</button>
                </li>
                 <li class="menu-item">
                    <img src="images/refreshment.png" class="menu-image" />
                    <h3>juice</h3>
                    <p class="price">₹180</p>
                    <button class="cart-btn" onclick="addToCart('Juice', 190, 'images/hot-beverages.png')">Add to Cart 🛒</button>
                </li>
            </ul>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
